<section id="professionisti">
  <h4>CRM professionisti</h4>
  <table class="table">
    <thead>
      <tr>
        <th scope="col">#</th>
        <th scope="col">Nome</th>
        <th scope="col">Ruolo</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      {% for bim_expert in expert_list.all %}
      <tr>
        <th scope="row">{{forloop.counter}}</th>
        <td>{{ bim_expert.name }}</td>
        <td>{{ bim_expert.description }}</td>
        <td class="d-flex gap-2 justify-content-end">
          <a href="{% url 'update_expert' pk=bim_expert.pk %}" class="btn btn-outline-primary btn-sm">Modifica</a>
          <a href="{% url 'delete_expert' pk=bim_expert.pk %}" class="btn btn-outline-danger btn-sm">Cancella</a>
        </td>
      </tr>
      {% empty %}
      <tr>
        <td colspan="4" class="text-muted">Nessun professionista presente.</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  <div class="d-flex gap-2 justify-content-end">
    <a href="{% url 'create_expert' %}" class="btn btn-outline-primary btn">+ Aggiungi professionista</a>
  </div>
  <hr>
</section>
